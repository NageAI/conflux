name: Benchmark

on:
  workflow_dispatch:
    inputs:
      primary_model:
        description: "Primary model (e.g., Qwen/Qwen3-8B)"
        required: false
        default: "synthetic"
      source_model:
        description: "Source model (e.g., meta-llama/Llama-3-8B)"
        required: false
        default: "synthetic"

jobs:
  benchmark:
    name: CONFLUX Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy pytest pytest-benchmark
          pip install -e .

      - name: Run benchmarks
        run: |
          python -c "
          import torch, time, json
          from conflux.cka import linear_cka, compute_cka_matrix, match_layers_hungarian
          from conflux.svd_init import residual_svd_init
          from conflux.rank_alloc import allocate_ranks
          from conflux.residual import ResidualInfo

          results = {}

          # CKA benchmark
          for n_samples in [128, 256, 512, 1024]:
              for dim in [2048, 4096]:
                  X = torch.randn(n_samples, dim)
                  Y = torch.randn(n_samples, dim)
                  start = time.perf_counter()
                  for _ in range(10):
                      linear_cka(X, Y)
                  elapsed = (time.perf_counter() - start) / 10
                  key = f'cka_linear_{n_samples}x{dim}'
                  results[key] = round(elapsed * 1000, 2)
                  print(f'{key}: {results[key]}ms')

          # CKA matrix benchmark
          for n_layers in [16, 32, 48]:
              hs = [torch.randn(128, 2048) for _ in range(n_layers)]
              start = time.perf_counter()
              compute_cka_matrix(hs, hs, max_samples=128)
              elapsed = time.perf_counter() - start
              key = f'cka_matrix_{n_layers}layers'
              results[key] = round(elapsed, 2)
              print(f'{key}: {results[key]}s')

          # SVD init benchmark
          for rank in [8, 16, 32, 64]:
              R = torch.randn(256, 4096)
              start = time.perf_counter()
              for _ in range(10):
                  residual_svd_init(R, rank)
              elapsed = (time.perf_counter() - start) / 10
              key = f'svd_init_rank{rank}'
              results[key] = round(elapsed * 1000, 2)
              print(f'{key}: {results[key]}ms')

          with open('benchmark_results.json', 'w') as f:
              json.dump(results, f, indent=2)
          print('\nAll benchmarks complete.')
          "

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
